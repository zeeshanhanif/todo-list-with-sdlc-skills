# Cloud Run Job — cleanup/outbox worker (ADR-007). Triggered by Cloud Scheduler
# (~every minute) in cloud environments. Placeholder image + secret refs.
# Not applied: `gcloud run jobs replace deploy/cloudrun-worker-job.yaml`.
apiVersion: run.googleapis.com/v1
kind: Job
metadata:
  name: todo-worker
  labels:
    app: todo
    unit: worker
spec:
  template:
    spec:
      template:
        spec:
          maxRetries: 3
          timeoutSeconds: 300
          containers:
            - image: REGION-docker.pkg.dev/PROJECT/todo/worker:latest
              env:
                - name: NODE_ENV
                  value: production
                # Set at deploy time as Cloud Run Job env vars. Carry secrets
                # (DB password, email key) — visible to anyone with Cloud Run
                # viewer access. Never committed to source (NFR-MAINT-003).
                - name: DATABASE_URL
                  value: REPLACE_AT_DEPLOY
                - name: EMAIL_API_KEY
                  value: REPLACE_AT_DEPLOY
              resources:
                limits:
                  cpu: "1"
                  memory: 512Mi
